<header class="header">
  <div class="header-container">
    <!-- App Logo/Name -->
    <div class="header-left">
      <h1 class="app-name">{{ appName }}</h1>
    </div>

    <!-- Hamburger Menu for Mobile -->
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Navigation and Member Dropdown -->
    <div class="header-right" [class.open]="isMenuOpen">
      <!-- Navigation Links -->
      <nav class="nav-links">
        <a 
          *ngFor="let link of navigationLinks" 
          class="nav-link"
          (click)="navigate(link.route)"
          href="javascript:void(0)">
          {{ link.label }}
        </a>
      </nav>

      <!-- Member Dropdown -->
      <div class="member-dropdown">
        <select 
          class="member-select" 
          [(ngModel)]="selectedMember"
          (change)="onMemberSelected(selectedMember)"
          aria-label="Select member">
          <option value="" disabled selected>Select Member</option>
          <option *ngFor="let member of members" [value]="member">
            {{ member }}
          </option>
        </select>
      </div>
    </div>
  </div>
</header>

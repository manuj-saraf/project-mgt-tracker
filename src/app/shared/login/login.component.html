<div class="login-container">
  <div class="login-card">
    <!-- Application Title -->
    <h1 class="app-title">{{ appTitle }}</h1>

    <!-- Project Description -->
    <p class="project-description">{{ projectDescription }}</p>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- User ID Field -->
      <div class="form-group">
        <label for="userId" class="form-label">User ID</label>
        <input
          type="text"
          id="userId"
          formControlName="userId"
          class="form-input"
          placeholder="Enter 6-digit User ID"
          maxlength="6"
          pattern="[0-9]*"
          inputmode="numeric"
        >

        <!-- Error Messages -->
        <div class="error-message" *ngIf="userId?.invalid && userId?.touched">
          <span *ngIf="userId?.errors?.['required']">User ID is required</span>
          <span *ngIf="userId?.errors?.['pattern']">User ID must contain only numbers</span>
          <span *ngIf="userId?.errors?.['maxlength']">User ID cannot exceed 6 digits</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-button"
        [disabled]="isSubmitDisabled"
      >
        Login
      </button>
    </form>
  </div>
</div>

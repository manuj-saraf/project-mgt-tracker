<app-header></app-header>
<div class="base-container" *ngIf="!hasChildRoute">
  <div class="welcome-section">
    <h2>Welcome to Project Management Tracker</h2>
    <p>Manage your projects and team members efficiently</p>
    <div class="feature-cards">
      <div class="card" *ngFor="let item of navigationLinks" (click)="navigate(item.route)">
        <h3>{{ item.label }}</h3>
        <p>{{ item.description }}</p>
      </div>
    </div>
  </div>
</div>
<router-outlet></router-outlet>
